<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ESEC TREES</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
</head>

<body class="admin-page">
    <nav class="navbar admin-navbar">
        <div class="logo">ESEC TREES <span class="badge" data-i18n="admin_badge">Admin</span></div>
        <div class="nav-links">
            <button class="theme-btn" onclick="toggleTheme()">
                <svg id="theme-icon-admin" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
            <button class="lang-btn" onclick="toggleLanguage()">EN / TA</button>
            <a href="index.html" class="nav-link" data-i18n="view_site">View Site</a>
            <button onclick="logoutAdmin()" class="login-btn btn-danger" data-i18n="logout">Logout</button>
        </div>
    </nav>

    <div class="container admin-container">
        <div class="admin-header">
            <h2 data-i18n="admin_dash_title">Tree Management Dashboard</h2>
            <p data-i18n="admin_dash_desc">Add, edit, or remove tree data from the ecosystem.</p>
        </div>

        <div class="admin-grid">
            <!-- Add Tree Form -->
            <div class="admin-form-card">
                <h3>Add New Tree</h3>
                <form id="add-tree-form" onsubmit="handleAddTree(event)">
                    <div class="input-group">
                        <label for="tree-name" data-i18n="tree_name">Tree Name</label>
                        <input type="text" id="tree-name" required placeholder="e.g., Banyan Tree">
                    </div>

                    <div class="input-group">
                        <label for="tree-bio-name" data-i18n="bio_name">Biological Name</label>
                        <input type="text" id="tree-bio-name" required placeholder="e.g., Ficus benghalensis"
                            style="font-style: italic;">
                    </div>

                    <div class="input-group">
                        <label for="tree-species-count" data-i18n="species_count_label">Species Count</label>
                        <input type="number" id="tree-species-count" required placeholder="e.g., 150" min="1">
                    </div>

                    <div class="input-group">
                        <label for="tree-desc">Description</label>
                        <textarea id="tree-desc" rows="4" required placeholder="Key details and benefits..."></textarea>
                    </div>

                    <div class="input-group">
                        <label for="tree-img" class="file-upload-label">
                            <span id="file-name">Upload Image (Max 2MB)</span>
                            <input type="file" id="tree-img" accept="image/*" required
                                onchange="handleFileSelect(event)">
                        </label>
                    </div>

                    <p id="image-error" class="error-msg"></p>

                    <button type="submit" class="submit-btn admin-btn" data-i18n="publish_btn">Publish to ESEC
                        TREES</button>
                </form>
            </div>

            <!-- Existing Trees List -->
            <div class="admin-list-card">
                <h3 data-i18n="manage_db">Manage Uploaded Database</h3>
                <div id="admin-tree-list" class="admin-tree-list">
                    <!-- Dynamic List Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Global Ripple Container -->
    <div id="ripple-container"></div>
</body>

</html>
